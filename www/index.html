<!DOCTYPE html>

<head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 500px;
  width: 90%;
  padding: 40px 30px;
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: center;
}
h1 {
  font-size: 2.2em;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { color: #888; margin-bottom: 30px; font-size: 0.95em; }
.links { display: flex; flex-direction: column; gap: 14px; }
a {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 22px;
  background: #f8f9fa;
  border-radius: 14px;
  text-decoration: none;
  color: #333;
  transition: all 0.3s;
  border-left: 4px solid #667eea;
}
a:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(102,126,234,0.2);
  background: #fff;
}
a .icon { font-size: 1.6em; }
a .info { text-align: left; flex: 1; }
a .name { font-weight: 600; font-size: 1.05em; }
a .desc { font-size: 0.85em; color: #888; margin-top: 3px; }
a .tag {
  font-size: 0.75em;
  padding: 4px 10px;
  border-radius: 12px;
  background: #e8f5e9;
  color: #2e7d32;
  font-weight: 500;
}
a .tag.lock {
  background: #fff3e0;
  color: #e65100;
}
.footer {
  margin-top: 30px;
  font-size: 0.8em;
  color: #bbb;
}
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s ease-out">

</div>
<style>@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}</style>
<div class="container">

    <a href="https://xiaohua.daniu.win">

      <div class="info">
        <div class="name">小花身体记录</div>

<script>
// Intercept all link clicks and use window.location instead of native navigation
// This keeps navigation within the Capacitor WebView
document.addEventListener('click', function(e) {
  var link = e.target.closest('a');
  if (!link) return;
  var href = link.getAttribute('href');
  if (!href || href.startsWith('#') || href.startsWith('javascript:')) return;
  e.preventDefault();
  window.location.href = href;
}, false);
function hideSplash(){
  var s=document.getElementById('splash');
  if(!s)return;
  s.style.opacity='0';
  setTimeout(function(){s.remove()},600);
}
if(document.readyState==='complete'){hideSplash();}
else{window.addEventListener('load',function(){setTimeout(hideSplash,200)});}
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
