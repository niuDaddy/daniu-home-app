name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install
        run: |
          npm install
          # Install geolocation plugin for "distance sort" feature
          npm install @capacitor/geolocation@7.1.8
          npx cap add android

      - name: Patch Capacitor Bridge to keep all links in WebView
        run: |
          python3 -c "
          import re
          bp = 'node_modules/@capacitor/android/capacitor/src/main/java/com/getcapacitor/Bridge.java'
          with open(bp, 'r') as f: content = f.read()
          m = re.search(r'(public boolean launchIntent\(Uri url\)\s*\{)(.*?)(\n    \})', content, re.DOTALL)
          if m:
              content = content[:m.start()] + m.group(1) + '\n        // PATCHED: Force ALL links to stay in WebView\n        return false;\n    }' + content[m.end():]
              with open(bp, 'w') as f: f.write(content)
              print('✅ Bridge.java patched')
          else:
              print('❌ Patch failed')
              exit(1)
          "

      - name: Add location permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'ACCESS_FINE_LOCATION' "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "$MANIFEST"
            echo '✅ AndroidManifest patched with location permissions'
          else
            echo 'ℹ️  Location permissions already present'
          fi

      - name: Inject refresh button into all pages
        run: python3 scripts/inject-refresh.py

      - name: Replace icons with cat icon
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_foreground.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

      - name: Sync
        run: npx cap sync android

      - name: Set version (must run AFTER cap sync to avoid overwrite)
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${VERSION_CODE}"
          sed -i "s/versionCode 1/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          # Update version in footer (source + synced assets)
          sed -i "s|v1\.0\.[0-9]*|v${VERSION_NAME}|" www/index.html
          sed -i "s|v1\.0\.[0-9]*|v${VERSION_NAME}|" android/app/src/main/assets/public/index.html
          # Update version.json (source + synced assets)
          printf '{\n  "latest": "%s",\n  "build": %s,\n  "date": "%s",\n  "apk_url": "https://github.com/niuDaddy/daniu-home-app/releases/download/v%s/app-debug.apk"\n}\n' "$VERSION_NAME" "$VERSION_CODE" "$(date +%Y-%m-%d)" "$VERSION_NAME" > www/version.json
          cp www/version.json android/app/src/main/assets/public/version.json
          echo "✅ Version: ${VERSION_NAME} (${VERSION_CODE})"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/daniu.keystore

      - name: Sign APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          # Sign with fixed keystore
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          "$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner" sign \
            --ks daniu.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            "$APK"
          echo "✅ APK signed with fixed keystore"

      - uses: actions/upload-artifact@v4
        with:
          name: daniu-home-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release (public download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: "自动构建 v1.0.${{ github.run_number }}"
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync version.json to coupon-dashboard
        run: |
          # Clone coupon-dashboard (openclaw-config repo), update version.json, push
          REPO_DIR=$(mktemp -d)
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/niuDaddy/openclaw-config.git "$REPO_DIR"
          cd "$REPO_DIR"
          # version.json goes in coupon-dashboard/static/
          mkdir -p coupon-dashboard/static
          cp ../www/version.json coupon-dashboard/static/version.json
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add coupon-dashboard/static/version.json
          git diff --quiet --cached || git commit -m "chore: sync version.json from build ${{ github.run_number }}"
          git push
          echo "✅ version.json synced to coupon-dashboard"
          rm -rf "$REPO_DIR"
