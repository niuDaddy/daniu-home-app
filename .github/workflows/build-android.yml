name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install
        run: |
          npm ci
          npx cap add android

      - name: Set version
        run: |
          sed -i 's/versionCode 1/versionCode 31/' android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "1.0.31"/' android/app/build.gradle

      - name: Replace icons
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_foreground.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

      - name: Sync
        run: npx cap sync android

      - name: Build
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: daniu-home-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
