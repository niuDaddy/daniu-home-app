name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install
        run: |
          npm install
          npx cap add android

      - name: Replace icons with cat icon
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_foreground.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

      - name: Patch MainActivity to keep all links in WebView
        run: |
          # Find MainActivity.java
          MAINACTIVITY=$(find android -name "MainActivity.java" | head -1)
          if [ -z "$MAINACTIVITY" ]; then
            MAINACTIVITY=$(find android -name "MainActivity.kt" | head -1)
          fi
          echo "Found: $MAINACTIVITY"
          
          # Patch Java version
          if [ "$(basename $MAINACTIVITY)" = "MainActivity.java" ]; then
            # Add shouldOverrideUrlLoading override
            if ! grep -q "shouldOverrideUrlLoading" "$MAINACTIVITY"; then
              sed -i 's/public class MainActivity extends PlatformActivity {/public class MainActivity extends PlatformActivity {\n    @Override\n    public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {\n        return false;\n    }/' "$MAINACTIVITY"
            fi
          fi

      - name: Configure AndroidManifest
        run: |
          # Enable cleartext and intent handling
          sed -i 's|android:allowBackup="true"|android:allowBackup="true" android:usesCleartextTraffic="true"|' android/app/src/main/AndroidManifest.xml

      - name: Sync
        run: npx cap sync android

      - name: Build
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: daniu-home-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
