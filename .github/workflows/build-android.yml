name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install
        run: |
          npm install
          npx cap add android

      - name: Replace icons with cat icon
        run: |
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_foreground.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp www/icon-192.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

      - name: Configure allowNavigation in AndroidManifest
        run: |
          # Add allowNavigation to prevent Chrome from opening internal links
          sed -i 's|<application|<application\n        android:usesCleartextTraffic="true"|' android/app/src/main/AndroidManifest.xml
          # Ensure external links open in webview
          grep -q "android:allowNavigation" android/app/src/main/AndroidManifest.xml || \
          sed -i 's|</application>|    <meta-data android:name="android.webkit.WebView.EnableSlowPath" android:value="false" />\n</application>|' android/app/src/main/AndroidManifest.xml

      - name: Sync
        run: npx cap sync android

      - name: Build
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: daniu-home-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
